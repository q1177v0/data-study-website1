        <div class="code-box">
            <textarea id="codeEditor">import pandas as pd
df = pd.DataFrame({
    "性别":["男","女","男","女"],
    "意向产品":["A","B","B","A"],
    "意向度":[7,8,6,9]
})
print("市场调研问卷数据：")
print(df)

# 不同性别平均意向度
user_avg = df.groupby("性别")["意向度"].mean()
print("\n不同性别平均意向度：")
print(user_avg)
