        <div class="code-box">
            <textarea id="codeEditor">import pandas as pd
# 构造测试数据
data = {
    "姓名":["张三","李四","王五","李四",None],
    "成绩":[88,76,92,76,85]
}
df = pd.DataFrame(data)
print("原始数据：")
print(df)

# 去除重复行
df_drop_dup = df.drop_duplicates()
print("\n去重后数据：")
print(df_drop_dup)

# 填充空值
df_fill = df_drop_dup.fillna("未知")
print("\n空值填充后：")
print(df_fill)
</textarea>
