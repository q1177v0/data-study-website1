        <div class="code-box">
            <textarea id="codeEditor">import pandas as pd
df = pd.DataFrame({
    "线路":["东线","西线","东线","西线"],
    "运单量":[90,75,85,68],
    "运输时长":[22,19,23,18]
})
print("物流运单数据：")
print(df)

# 各线路平均运输时长
time_avg = df.groupby("线路")["运输时长"].mean()
print("\n各线路平均运输时长：")
print(time_avg)
