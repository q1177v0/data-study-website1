            <textarea id="codeEditor">import pandas as pd
df = pd.DataFrame({
    "仓库":["A仓","B仓","A仓","B仓"],
    "商品":["零件1","零件1","零件2","零件2"],
    "库存数量":[120,95,80,110]
})
print("供应链库存数据：")
print(df)

# 按仓库汇总库存
stock_sum = df.groupby("仓库")["库存数量"].sum()
print("\n各仓库总库存：")
print(stock_sum)
