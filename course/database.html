        <div class="code-box">
            <textarea id="codeEditor">import pandas as pd
# 模拟学生数据表
student = pd.DataFrame({
    "学号":[101,102,103,104],
    "姓名":["小明","小红","小刚","小丽"],
    "班级":["一班","二班","一班","二班"],
    "分数":[78,92,85,88]
})
print("学生数据表：")
print(student)

# 筛选一班学生
class1 = student[student["班级"] == "一班"]
print("\n一班学生数据：")
print(class1)

# 按班级分组求平均分
avg_score = student.groupby("班级")["分数"].mean()
print("\n各班平均分：")
print(avg_score)
