        <div class="code-box">
            <textarea id="codeEditor">import pandas as pd
df = pd.DataFrame({
    "日期":["周一","周一","周二","周二"],
    "类型":["收入","支出","收入","支出"],
    "金额":[5000,1200,4800,1500]
})
print("交易明细：")
print(df)

# 分别统计收入和支出
income = df[df["类型"]=="收入"]["金额"].sum()
outcome = df[df["类型"]=="支出"]["金额"].sum()
print(f"\n总收入：{income}")
print(f"总支出：{outcome}")
print(f"结余：{income - outcome}")
</textarea>
