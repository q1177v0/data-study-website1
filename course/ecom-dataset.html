        <h2>电商运营数据集</h2>
        <p style="color:#94a3b8;margin:10px 0;">商品销量、单价、销售额、品类分析</p >

        <div class="code-box">
            <textarea id="codeEditor">import pandas as pd
df = pd.DataFrame({
    "品类":["数码","服饰","数码","服饰"],
    "商品":["手机","T恤","耳机","裤子"],
    "销量":[25,40,32,28],
    "单价":[1999,89,129,129]
})
print("电商销售数据：")
print(df)

# 计算单品销售额
df["销售额"] = df["销量"] * df["单价"]
print("\n含销售额数据：")
print(df)

# 按品类汇总营收
cat_sale = df.groupby("品类")["销售额"].sum()
print("\n各品类总营收：")
print(cat_sale)
